name: SAST Security Scans

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  codeql:
    name: CodeQL (C#)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: csharp

      - name: Autobuild
        uses: github/codeql-action/autobuild@v4

      - name: Analyze
        uses: github/codeql-action/analyze@v4

  semgrep:
    name: Semgrep (C#)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install Semgrep
        run: python -m pip install --upgrade semgrep

      - name: Run Semgrep scan (report-only)
        run: |
          semgrep scan \
            --config p/csharp \
            --config p/secrets \
            --sarif \
            --output semgrep.sarif \
            . || true

      - name: Upload Semgrep report
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-sarif
          path: semgrep.sarif

  tfsec:
    name: tfsec (Terraform)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run tfsec scan (report-only)
        run: |
          docker run --rm \
            -v "$PWD:/src" \
            aquasec/tfsec \
            /src/terraform \
            --format sarif \
            --out /src/tfsec.sarif || true

      - name: Upload tfsec report
        uses: actions/upload-artifact@v4
        with:
          name: tfsec-sarif
          path: tfsec.sarif

  trivy:
    name: Trivy (Container Images)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image_name: marketing-site
            dockerfile: Dockerfile.site
          - image_name: marketing-api
            dockerfile: Dockerfile.api
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build image
        run: |
          docker build \
            -f ./${{ matrix.dockerfile }} \
            -t ${{ matrix.image_name }}:scan \
            .

      - name: Run Trivy scan (report-only)
        run: |
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v "$PWD:/work" \
            aquasec/trivy:latest image \
            --format sarif \
            --output /work/trivy-${{ matrix.image_name }}.sarif \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --scanners vuln,misconfig,secret \
            ${{ matrix.image_name }}:scan || true

      - name: Upload Trivy report
        uses: actions/upload-artifact@v4
        with:
          name: trivy-${{ matrix.image_name }}-sarif
          path: trivy-${{ matrix.image_name }}.sarif
